name: Build Borg Runtime Base

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile.runtime-base
      - docker/runtime-base.env
      - .github/workflows/docker-runtime-base.yml
  workflow_dispatch:
    inputs:
      base_tag_override:
        description: "Optional tag to publish instead of docker/runtime-base.env"
        required: false
        type: string
      push_image:
        description: "Push the runtime base image after smoke tests pass"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 4 * * 1"

concurrency:
  group: docker-runtime-base-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/borgscale-runtime-base
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  smoke-test-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Load runtime base versions
        id: versions
        run: |
          set -a
          source docker/runtime-base.env
          set +a
          TAG_VALUE="${BORG_RUNTIME_BASE_TAG}"
          if [ -n "${{ inputs.base_tag_override }}" ]; then
            TAG_VALUE="${{ inputs.base_tag_override }}"
          fi
          echo "base_tag=${TAG_VALUE}" >> "$GITHUB_OUTPUT"
          echo "borg1=${BORG1_VERSION}" >> "$GITHUB_OUTPUT"
          echo "borg2=${BORG2_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build amd64 runtime base locally
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.runtime-base
          platforms: linux/amd64
          load: true
          tags: borgscale-runtime-base:smoke-test
          cache-from: type=gha,scope=runtime-base
          build-args: |
            BORG1_VERSION=${{ steps.versions.outputs.borg1 }}
            BORG2_VERSION=${{ steps.versions.outputs.borg2 }}

      - name: Smoke test runtime base
        run: |
          docker run --rm borgscale-runtime-base:smoke-test borg --version
          docker run --rm borgscale-runtime-base:smoke-test borg2 --version
          docker run --rm borgscale-runtime-base:smoke-test python3 -c "import pyfuse3; print('pyfuse3 ok')"

  build-and-push:
    runs-on: ubuntu-latest
    needs: [smoke-test-amd64]
    if: github.event_name != 'workflow_dispatch' || inputs.push_image
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Load runtime base versions
        id: versions
        run: |
          set -a
          source docker/runtime-base.env
          set +a
          TAG_VALUE="${BORG_RUNTIME_BASE_TAG}"
          if [ -n "${{ inputs.base_tag_override }}" ]; then
            TAG_VALUE="${{ inputs.base_tag_override }}"
          fi
          echo "base_tag=${TAG_VALUE}" >> "$GITHUB_OUTPUT"
          echo "borg1=${BORG1_VERSION}" >> "$GITHUB_OUTPUT"
          echo "borg2=${BORG2_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.versions.outputs.base_tag }}
            type=raw,value=runtime-latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push runtime base
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.runtime-base
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=runtime-base
          cache-to: type=gha,scope=runtime-base,mode=max
          build-args: |
            BORG1_VERSION=${{ steps.versions.outputs.borg1 }}
            BORG2_VERSION=${{ steps.versions.outputs.borg2 }}
