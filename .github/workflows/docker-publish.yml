name: Build and Publish Docker Images

on:
  push:
    tags:
      - 'v*'  # Only build on version tags (e.g., v1.0.1)
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build, for example 2.0.5-rc.1"
        required: true
        type: string
      push_image:
        description: "Push the app image after smoke tests pass"
        required: false
        default: false
        type: boolean
      base_tag_override:
        description: "Optional runtime base tag to use instead of docker/runtime-base.env"
        required: false
        type: string

# Ensure only one Docker build runs at a time for the same tag
concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: false  # Don't cancel, let it finish

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/borgscale
  RUNTIME_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/borgscale-runtime-base
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_VERSION: "22"

jobs:
  frontend-build:
    name: Frontend / Release Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build-output
          path: |
            frontend/build/
            frontend/dist/
          if-no-files-found: error
          retention-days: 1

  smoke-test-amd64:
    runs-on: ubuntu-latest
    needs: [frontend-build]
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download frontend build artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-build-output
          path: frontend-artifact

      - name: Prepare frontend build context
        run: |
          rm -rf docker/frontend-build-output
          mkdir -p docker/frontend-build-output
          if [ -d "frontend-artifact/build" ]; then
            cp -R frontend-artifact/build/. docker/frontend-build-output/
          elif [ -d "frontend-artifact/dist" ]; then
            cp -R frontend-artifact/dist/. docker/frontend-build-output/
          elif [ -d "frontend-artifact/frontend/build" ]; then
            cp -R frontend-artifact/frontend/build/. docker/frontend-build-output/
          elif [ -d "frontend-artifact/frontend/dist" ]; then
            cp -R frontend-artifact/frontend/dist/. docker/frontend-build-output/
          else
            echo "Frontend build artifact did not contain build output"
            find frontend-artifact -maxdepth 4 -type d | sort
            exit 1
          fi

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate version number
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
            if [[ -z "$VERSION" ]]; then
              echo "ERROR: workflow_dispatch requires a version input"
              exit 1
            fi
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"  # Remove 'v' prefix
          else
            echo "ERROR: This workflow should only run on version tags (v*)"
            exit 1
          fi

          if [[ "$VERSION" == *-* ]]; then
            echo "is_stable=false" >> $GITHUB_OUTPUT
          else
            echo "is_stable=true" >> $GITHUB_OUTPUT
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Load runtime base tag
        id: runtime
        run: |
          set -a
          source docker/runtime-base.env
          set +a
          TAG_VALUE="${BORG_RUNTIME_BASE_TAG}"
          if [ -n "${{ inputs.base_tag_override }}" ]; then
            TAG_VALUE="${{ inputs.base_tag_override }}"
          fi
          echo "base_tag=${TAG_VALUE}" >> "$GITHUB_OUTPUT"
          echo "base_image=${{ env.REGISTRY }}/${{ env.RUNTIME_IMAGE_NAME }}:${TAG_VALUE}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # Always publish the exact version tag, including prereleases
            type=raw,value=${{ steps.version.outputs.version }}
            # Only stable releases should publish moving tags
            type=raw,value=latest,enable=${{ steps.version.outputs.is_stable == 'true' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ steps.version.outputs.is_stable == 'true' }}
            type=semver,pattern={{major}},enable=${{ steps.version.outputs.is_stable == 'true' && !startsWith(github.ref, 'refs/tags/v0.') }}

      - name: Build amd64 app image locally
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: borgscale-app:smoke-test
          cache-from: type=gha,scope=app-release
          build-args: |
            BASE_IMAGE=${{ steps.runtime.outputs.base_image }}
            APP_VERSION=${{ steps.version.outputs.version || steps.meta.outputs.version || 'dev' }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}

      - name: Smoke test amd64 app image
        run: |
          docker run -d --rm --name borgscale-smoke -p 18081:8081 \
            -e SECRET_KEY=test-secret-key-for-ci \
            -e ACTIVATION_SERVICE_URL= \
            borgscale-app:smoke-test
          cleanup() {
            docker rm -f borgscale-smoke >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          timeout 60 bash -c 'until curl -fsS http://127.0.0.1:18081/ >/dev/null; do sleep 2; done'
          docker exec borgscale-smoke borg --version
          docker exec borgscale-smoke borg2 --version

  build-and-push:
    runs-on: ubuntu-latest
    needs: [frontend-build, smoke-test-amd64]
    if: github.event_name != 'workflow_dispatch' || inputs.push_image
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download frontend build artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-build-output
          path: frontend-artifact

      - name: Prepare frontend build context
        run: |
          rm -rf docker/frontend-build-output
          mkdir -p docker/frontend-build-output
          if [ -d "frontend-artifact/build" ]; then
            cp -R frontend-artifact/build/. docker/frontend-build-output/
          elif [ -d "frontend-artifact/dist" ]; then
            cp -R frontend-artifact/dist/. docker/frontend-build-output/
          elif [ -d "frontend-artifact/frontend/build" ]; then
            cp -R frontend-artifact/frontend/build/. docker/frontend-build-output/
          elif [ -d "frontend-artifact/frontend/dist" ]; then
            cp -R frontend-artifact/frontend/dist/. docker/frontend-build-output/
          else
            echo "Frontend build artifact did not contain build output"
            find frontend-artifact -maxdepth 4 -type d | sort
            exit 1
          fi

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate version number
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
            if [[ -z "$VERSION" ]]; then
              echo "ERROR: workflow_dispatch requires a version input"
              exit 1
            fi
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"  # Remove 'v' prefix
          else
            echo "ERROR: This workflow should only run on version tags (v*)"
            exit 1
          fi

          if [[ "$VERSION" == *-* ]]; then
            echo "is_stable=false" >> $GITHUB_OUTPUT
          else
            echo "is_stable=true" >> $GITHUB_OUTPUT
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Load runtime base tag
        id: runtime
        run: |
          set -a
          source docker/runtime-base.env
          set +a
          TAG_VALUE="${BORG_RUNTIME_BASE_TAG}"
          if [ -n "${{ inputs.base_tag_override }}" ]; then
            TAG_VALUE="${{ inputs.base_tag_override }}"
          fi
          echo "base_tag=${TAG_VALUE}" >> "$GITHUB_OUTPUT"
          echo "base_image=${{ env.REGISTRY }}/${{ env.RUNTIME_IMAGE_NAME }}:${TAG_VALUE}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ steps.version.outputs.is_stable == 'true' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ steps.version.outputs.is_stable == 'true' }}
            type=semver,pattern={{major}},enable=${{ steps.version.outputs.is_stable == 'true' && !startsWith(github.ref, 'refs/tags/v0.') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=app-release
          cache-to: type=gha,scope=app-release,mode=max
          build-args: |
            BASE_IMAGE=${{ steps.runtime.outputs.base_image }}
            APP_VERSION=${{ steps.version.outputs.version || steps.meta.outputs.version || 'dev' }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          readme-filepath: ./README.md
          short-description: "Web UI for Borg Backup - Backup management made easy"
