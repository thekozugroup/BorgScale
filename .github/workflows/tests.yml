name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "22"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SMOKE_URL: "http://localhost:8082"

jobs:
  backend-lint:
    name: Backend / Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ruff lint
        run: |
          ruff check app tests

      - name: Run Ruff format check
        run: |
          ruff format --check app tests

  backend-unit-coverage:
    name: Backend / Unit Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y borgbackup

      - name: Verify Borg installation
        run: |
          borg --version
          which borg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create test directories
        run: |
          mkdir -p /tmp/borgscale-tests
          mkdir -p data
          mkdir -p logs

      - name: Run backend unit coverage
        run: |
          pytest \
            tests/unit \
            -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage-xml
          path: coverage.xml
          if-no-files-found: error
          retention-days: 7

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report-backend
          path: htmlcov/
          retention-days: 30

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 70
          MINIMUM_ORANGE: 50

  backend-api-integration:
    name: Backend / Integration Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y borgbackup

      - name: Verify Borg installation
        run: |
          borg --version
          which borg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create test directories
        run: |
          mkdir -p /tmp/borgscale-tests
          mkdir -p data
          mkdir -p logs

      - name: Run backend integration suite
        run: |
          pytest \
            tests/integration/test_api_archives_integration.py \
            tests/integration/test_api_backup_integration.py \
            tests/integration/test_api_mounts_integration.py \
            tests/integration/test_backup_workflows_integration.py \
            tests/integration/test_api_repositories_integration.py \
            tests/integration/test_api_restore_integration.py \
            tests/integration/test_api_schedule_integration.py \
            tests/integration/test_multi_repo_schedule.py \
            -v
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379

  typecheck-lint-format:
    name: Frontend / Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Check locale key parity
        working-directory: frontend
        run: npm run check:locales

      - name: TypeScript type check
        working-directory: frontend
        run: npm run typecheck

      - name: Prettier format check
        working-directory: frontend
        run: npm run format:check

      - name: Run linter
        working-directory: frontend
        run: npm run lint

  frontend-vitest:
    name: Frontend / Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload frontend coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage-lcov
          path: frontend/coverage/lcov.info
          if-no-files-found: error
          retention-days: 7

  coverage-backend:
    name: Coverage / Backend
    runs-on: ubuntu-latest
    needs: [backend-unit-coverage, backend-api-integration, frontend-vitest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download backend coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: backend-coverage-xml
          path: coverage-artifacts/backend

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-artifacts/backend/coverage.xml
          disable_search: true
          flags: backend-unit
          name: backend-unit-coverage
          verbose: true
          fail_ci_if_error: false

  coverage-frontend:
    name: Coverage / Frontend
    runs-on: ubuntu-latest
    needs: [backend-unit-coverage, backend-api-integration, frontend-vitest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download frontend coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-coverage-lcov
          path: coverage-artifacts/frontend

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-artifacts/frontend/lcov.info
          disable_search: true
          flags: frontend
          name: frontend-coverage
          verbose: true
          fail_ci_if_error: false

  frontend-build:
    name: Frontend / Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Check build output
        working-directory: frontend
        run: |
          if [ -d "dist" ]; then
            echo "Build successful - dist directory created"
            ls -lah dist/ | head -20
          elif [ -d "build" ]; then
            echo "Build successful - build directory created"
            ls -lah build/ | head -20
          else
            echo "Build directory not found"
            ls -lah
            exit 1
          fi

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build-output
          path: |
            frontend/build/
            frontend/dist/
          if-no-files-found: error
          retention-days: 7

  smoke-borg-core:
    name: Smoke / Core
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: [frontend-build]

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y borgbackup

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download frontend build artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-build-output
          path: frontend-artifact

      - name: Copy frontend build to static directory
        run: |
          mkdir -p app/static
          if [ -d "frontend-artifact/build" ]; then
            cp -r frontend-artifact/build/* app/static/
          elif [ -d "frontend-artifact/dist" ]; then
            cp -r frontend-artifact/dist/* app/static/
          elif [ -d "frontend-artifact/frontend/build" ]; then
            cp -r frontend-artifact/frontend/build/* app/static/
          elif [ -d "frontend-artifact/frontend/dist" ]; then
            cp -r frontend-artifact/frontend/dist/* app/static/
          else
            echo "Frontend build artifact did not contain build output"
            find frontend-artifact -maxdepth 4 -type d | sort
            exit 1
          fi

      - name: Create smoke test data
        run: |
          chmod +x tests/setup_test_env.sh
          ./tests/setup_test_env.sh

      - name: Start BorgScale backend
        run: |
          mkdir -p data logs
          uvicorn app.main:app --host 0.0.0.0 --port 8082 &
          echo $! > /tmp/borgscale.pid
        env:
          DATA_DIR: ${{ github.workspace }}/data
          SECRET_KEY: test-secret-key-for-ci-only
          DATABASE_URL: sqlite:///${{ github.workspace }}/data/test.db
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          ACTIVATION_SERVICE_URL: ""

      - name: Wait for service to be ready
        run: |
          timeout 60 bash -c 'until curl -s ${{ env.SMOKE_URL }}/api/docs > /dev/null; do sleep 2; done'

      - name: Run core smoke suite
        run: |
          python3 tests/smoke/run_core_smoke.py --url ${{ env.SMOKE_URL }}
        env:
          BORG_UI_CONTAINER: false

      - name: Stop BorgScale
        if: always()
        run: |
          if [ -f /tmp/borgscale.pid ]; then
            kill "$(cat /tmp/borgscale.pid)" || true
          fi

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: smoke-core-artifacts
          path: |
            /tmp/borgscale-tests/TEST_INFO.txt
            logs/
          if-no-files-found: ignore
          retention-days: 7

  smoke-borg-extended:
    name: Smoke / Extended
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [frontend-build]

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y borgbackup

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download frontend build artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-build-output
          path: frontend-artifact

      - name: Copy frontend build to static directory
        run: |
          mkdir -p app/static
          if [ -d "frontend-artifact/build" ]; then
            cp -r frontend-artifact/build/* app/static/
          elif [ -d "frontend-artifact/dist" ]; then
            cp -r frontend-artifact/dist/* app/static/
          elif [ -d "frontend-artifact/frontend/build" ]; then
            cp -r frontend-artifact/frontend/build/* app/static/
          elif [ -d "frontend-artifact/frontend/dist" ]; then
            cp -r frontend-artifact/frontend/dist/* app/static/
          else
            echo "Frontend build artifact did not contain build output"
            find frontend-artifact -maxdepth 4 -type d | sort
            exit 1
          fi

      - name: Create smoke test data
        run: |
          chmod +x tests/setup_test_env.sh
          ./tests/setup_test_env.sh

      - name: Start BorgScale backend
        run: |
          mkdir -p data logs
          uvicorn app.main:app --host 0.0.0.0 --port 8082 &
          echo $! > /tmp/borgscale.pid
        env:
          DATA_DIR: ${{ github.workspace }}/data
          SECRET_KEY: test-secret-key-for-ci-only
          DATABASE_URL: sqlite:///${{ github.workspace }}/data/test.db
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          ACTIVATION_SERVICE_URL: ""

      - name: Wait for service to be ready
        run: |
          timeout 60 bash -c 'until curl -s ${{ env.SMOKE_URL }}/api/docs > /dev/null; do sleep 2; done'

      - name: Run extended smoke suite
        run: |
          python3 tests/smoke/run_extended_smoke.py --url ${{ env.SMOKE_URL }}
        env:
          BORG_UI_CONTAINER: false

      - name: Stop BorgScale
        if: always()
        run: |
          if [ -f /tmp/borgscale.pid ]; then
            kill "$(cat /tmp/borgscale.pid)" || true
          fi

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: smoke-extended-artifacts
          path: |
            /tmp/borgscale-tests/TEST_INFO.txt
            logs/
          if-no-files-found: ignore
          retention-days: 7

  smoke-borg-ssh-localhost:
    name: Smoke / SSH
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [frontend-build]

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y borgbackup openssh-server

      - name: Configure localhost SSH target
        run: |
          sudo useradd -m -s /bin/bash borgsmoke || true
          sudo mkdir -p /home/borgsmoke/.ssh
          sudo touch /home/borgsmoke/.ssh/authorized_keys
          sudo chown borgsmoke:borgsmoke /home/borgsmoke
          sudo chmod 755 /home/borgsmoke
          sudo chmod 700 /home/borgsmoke/.ssh
          sudo chmod 600 /home/borgsmoke/.ssh/authorized_keys
          sudo chown -R borgsmoke:borgsmoke /home/borgsmoke/.ssh
          echo 'Port 2222' | sudo tee -a /etc/ssh/sshd_config
          echo 'PasswordAuthentication no' | sudo tee -a /etc/ssh/sshd_config
          echo 'PubkeyAuthentication yes' | sudo tee -a /etc/ssh/sshd_config
          echo 'PermitRootLogin no' | sudo tee -a /etc/ssh/sshd_config
          sudo mkdir -p /run/sshd
          sudo /usr/sbin/sshd -p 2222

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download frontend build artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-build-output
          path: frontend-artifact

      - name: Copy frontend build to static directory
        run: |
          mkdir -p app/static
          if [ -d "frontend-artifact/build" ]; then
            cp -r frontend-artifact/build/* app/static/
          elif [ -d "frontend-artifact/dist" ]; then
            cp -r frontend-artifact/dist/* app/static/
          elif [ -d "frontend-artifact/frontend/build" ]; then
            cp -r frontend-artifact/frontend/build/* app/static/
          elif [ -d "frontend-artifact/frontend/dist" ]; then
            cp -r frontend-artifact/frontend/dist/* app/static/
          else
            echo "Frontend build artifact did not contain build output"
            find frontend-artifact -maxdepth 4 -type d | sort
            exit 1
          fi

      - name: Start BorgScale backend
        run: |
          mkdir -p data logs
          uvicorn app.main:app --host 0.0.0.0 --port 8082 &
          echo $! > /tmp/borgscale.pid
        env:
          DATA_DIR: ${{ github.workspace }}/data
          SECRET_KEY: test-secret-key-for-ci-only
          DATABASE_URL: sqlite:///${{ github.workspace }}/data/test.db
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          ACTIVATION_SERVICE_URL: ""

      - name: Wait for service to be ready
        run: |
          timeout 60 bash -c 'until curl -s ${{ env.SMOKE_URL }}/api/docs > /dev/null; do sleep 2; done'

      - name: Run localhost SSH smoke
        run: |
          python3 tests/smoke/test_remote_ssh_smoke.py --url ${{ env.SMOKE_URL }}
        env:
          BORG_UI_CONTAINER: false
          SSH_SMOKE_HOST: 127.0.0.1
          SSH_SMOKE_PORT: 2222
          SSH_SMOKE_USER: borgsmoke
          SSH_SMOKE_AUTH_KEYS: /home/borgsmoke/.ssh/authorized_keys
          SSH_SMOKE_REMOTE_REPO: /home/borgsmoke/remote-repo

      - name: Stop BorgScale
        if: always()
        run: |
          if [ -f /tmp/borgscale.pid ]; then
            kill "$(cat /tmp/borgscale.pid)" || true
          fi

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: smoke-ssh-localhost-artifacts
          path: |
            logs/
          if-no-files-found: ignore
          retention-days: 7

  test-results:
    name: CI / Summary
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-unit-coverage, backend-api-integration, typecheck-lint-format, frontend-vitest, coverage-backend, coverage-frontend, frontend-build, smoke-borg-core, smoke-borg-extended, smoke-borg-ssh-localhost]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "Backend / Lint & Format: ${{ needs.backend-lint.result }}"
          echo "Backend / Unit Tests: ${{ needs.backend-unit-coverage.result }}"
          echo "Backend / Integration Tests: ${{ needs.backend-api-integration.result }}"
          echo "Frontend / Code Quality: ${{ needs.typecheck-lint-format.result }}"
          echo "Frontend / Unit Tests: ${{ needs.frontend-vitest.result }}"
          echo "Coverage / Backend: ${{ needs.coverage-backend.result }}"
          echo "Coverage / Frontend: ${{ needs.coverage-frontend.result }}"
          echo "Frontend / Build: ${{ needs.frontend-build.result }}"
          echo "Smoke / Core: ${{ needs.smoke-borg-core.result }}"
          echo "Smoke / Extended: ${{ needs.smoke-borg-extended.result }}"
          echo "Smoke / SSH: ${{ needs.smoke-borg-ssh-localhost.result }}"

          if [ "${{ needs.backend-lint.result }}" != "success" ]; then
            echo "Backend / Lint & Format failed"
            exit 1
          fi

          if [ "${{ needs.backend-unit-coverage.result }}" != "success" ]; then
            echo "Backend / Unit Tests failed"
            exit 1
          fi

          if [ "${{ needs.backend-api-integration.result }}" != "success" ]; then
            echo "Backend / Integration Tests failed"
            exit 1
          fi

          if [ "${{ needs.typecheck-lint-format.result }}" != "success" ]; then
            echo "Frontend / Code Quality failed"
            exit 1
          fi

          if [ "${{ needs.frontend-vitest.result }}" != "success" ]; then
            echo "Frontend / Unit Tests failed"
            exit 1
          fi

          if [ "${{ needs.coverage-backend.result }}" != "success" ]; then
            echo "Coverage / Backend failed"
            exit 1
          fi

          if [ "${{ needs.coverage-frontend.result }}" != "success" ]; then
            echo "Coverage / Frontend failed"
            exit 1
          fi

          if [ "${{ needs.frontend-build.result }}" != "success" ]; then
            echo "Frontend / Build failed"
            exit 1
          fi

          if [ "${{ needs.smoke-borg-core.result }}" != "success" ] && [ "${{ needs.smoke-borg-core.result }}" != "skipped" ]; then
            echo "Smoke / Core failed"
            exit 1
          fi

          if [ "${{ needs.smoke-borg-extended.result }}" != "success" ] && [ "${{ needs.smoke-borg-extended.result }}" != "skipped" ]; then
            echo "Smoke / Extended failed"
            exit 1
          fi

          if [ "${{ needs.smoke-borg-ssh-localhost.result }}" != "success" ] && [ "${{ needs.smoke-borg-ssh-localhost.result }}" != "skipped" ]; then
            echo "Smoke / SSH failed"
            exit 1
          fi

          echo "All test lanes passed"
